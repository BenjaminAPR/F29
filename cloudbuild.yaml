# Cloud Build: build → push → deploy Cloud Run (monorepo, Dockerfile en saas/).
#
# Activador: config desde repositorio = /cloudbuild.yaml
# Sustituciones OBLIGATORIAS en el activador:
#   _NEXT_PUBLIC_SUPABASE_URL
#   _NEXT_PUBLIC_SUPABASE_ANON_KEY
#
# Ajustá en sustituciones si aplica: _REGION, _SERVICE_NAME

substitutions:
  _REGION: southamerica-west1
  _SERVICE_NAME: f29
  _NEXT_PUBLIC_SUPABASE_URL: ""
  _NEXT_PUBLIC_SUPABASE_ANON_KEY: ""

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - "--build-arg"
      - "NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE_NAME}:${SHORT_SHA}"
      - "-f"
      - "saas/Dockerfile"
      - "saas"

  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE_NAME}:${SHORT_SHA}"
    waitFor:
      - build

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE_NAME}"
      - "--region=${_REGION}"
      - "--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE_NAME}:${SHORT_SHA}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - >-
        --set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,VERTEX_LOCATION=${_REGION},NEXT_PUBLIC_SUPABASE_URL=${_NEXT_PUBLIC_SUPABASE_URL},NEXT_PUBLIC_SUPABASE_ANON_KEY=${_NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - "--quiet"
    waitFor:
      - push
